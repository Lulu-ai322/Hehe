<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Plugin Compiler - One Click</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 550px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .mc-icon {
            font-size: 3.5em;
            margin-bottom: 10px;
            display: block;
        }

        h1 {
            font-size: 1.8em;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            opacity: 0.7;
            font-size: 0.95em;
        }

        .upload-area {
            border: 3px dashed rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 35px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.02);
        }

        .upload-area:hover {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.05);
            transform: translateY(-2px);
        }

        .upload-area.active {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
        }

        .upload-area.has-files {
            border-color: #00ccff;
            background: rgba(0, 204, 255, 0.05);
        }

        input[type="file"] { display: none; }

        .upload-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
            display: block;
        }

        .upload-text {
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .upload-hint {
            opacity: 0.5;
            font-size: 0.85em;
        }

        .file-info {
            margin: 15px 0;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .file-name {
            font-weight: 600;
            color: #00ff88;
        }

        .file-size {
            opacity: 0.6;
            font-size: 0.9em;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9em;
            opacity: 0.8;
        }

        .plugin-name {
            width: 100%;
            padding: 14px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }

        .plugin-name:focus {
            outline: none;
            border-color: #00ff88;
            background: rgba(0, 0, 0, 0.3);
        }

        .plugin-name::placeholder { color: rgba(255, 255, 255, 0.3); }

        .compile-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #0a192f;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .compile-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
        }

        .compile-btn:active:not(:disabled) {
            transform: translateY(-1px);
        }

        .compile-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }

        .compile-btn.loading {
            color: transparent;
        }

        .spinner {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 28px;
            height: 28px;
            border: 4px solid rgba(10, 25, 47, 0.2);
            border-top-color: #0a192f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .compile-btn.loading .spinner { display: block; }

        @keyframes spin { 
            to { transform: translate(-50%, -50%) rotate(360deg); } 
        }

        .status {
            margin-top: 20px;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            display: none;
            font-weight: 500;
            animation: fadeIn 0.3s ease;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: rgba(0, 255, 136, 0.15);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }

        .status.error {
            background: rgba(255, 50, 50, 0.15);
            border: 1px solid rgba(255, 50, 50, 0.3);
            color: #ff5555;
        }

        .status.info {
            background: rgba(0, 204, 255, 0.15);
            border: 1px solid rgba(0, 204, 255, 0.3);
            color: #00ccff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            opacity: 0.4;
            font-size: 0.8em;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 15px;
            overflow: hidden;
            display: none;
        }

        .progress-bar.show {
            display: block;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ff88, #00ccff);
            border-radius: 2px;
            transition: width 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="mc-icon">⛏️</span>
            <h1>MC Plugin Compiler</h1>
            <p class="subtitle">One-click compile your Minecraft plugin</p>
        </div>

        <div class="upload-area" id="uploadArea">
            <span class="upload-icon">📦</span>
            <p class="upload-text">Drop your plugin ZIP file here</p>
            <p class="upload-hint">or click to browse • src/, plugin.yml, pom.xml</p>
            <input type="file" id="fileInput" accept=".zip">
        </div>

        <div class="file-info" id="fileInfo">
            <span class="file-name" id="fileName"></span>
            <span class="file-size" id="fileSize"></span>
        </div>

        <div class="input-group">
            <label for="pluginName">Plugin Name (optional)</label>
            <input type="text" class="plugin-name" id="pluginName" 
                   placeholder="MyAwesomePlugin">
        </div>

        <button class="compile-btn" id="compileBtn" disabled>
            <span>⚡ Compile Plugin</span>
            <div class="spinner"></div>
        </button>

        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="status" id="status"></div>

        <div class="footer">
            Powered by Railway + Docker • JDK 17 + Maven
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const compileBtn = document.getElementById('compileBtn');
        const pluginName = document.getElementById('pluginName');
        const status = document.getElementById('status');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');

        let selectedFile = null;

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('active');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('active');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('active');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFile(files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            if (!file.name.endsWith('.zip')) {
                showStatus('❌ Please upload a ZIP file', 'error');
                return;
            }

            selectedFile = file;
            fileName.textContent = file.name;
            fileSize.textContent = `(${(file.size / 1024).toFixed(1)} KB)`;
            fileInfo.classList.add('show');
            uploadArea.classList.add('has-files');
            compileBtn.disabled = false;
            status.className = 'status';
        }

        function showStatus(message, type) {
            status.textContent = message;
            status.className = 'status show ' + type;
        }

        function setProgress(percent) {
            progressBar.classList.add('show');
            progressFill.style.width = percent + '%';
        }

        compileBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            compileBtn.disabled = true;
            compileBtn.classList.add('loading');
            status.className = 'status';
            setProgress(10);

            const formData = new FormData();
            formData.append('files', selectedFile);
            formData.append('pluginName', pluginName.value || 'MyPlugin');

            try {
                setProgress(30);

                // Auto-detect API URL
                const API_URL = window.location.origin.includes('localhost') 
                    ? 'http://localhost:3000' 
                    : window.location.origin;

                setProgress(50);

                const response = await fetch(`${API_URL}/compile`, {
                    method: 'POST',
                    body: formData
                });

                setProgress(80);

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${pluginName.value || 'plugin'}.jar`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    a.remove();

                    setProgress(100);
                    showStatus('✅ Plugin compiled successfully! Downloading...', 'success');
                } else {
                    const error = await response.json();
                    throw new Error(error.error || 'Compilation failed');
                }
            } catch (err) {
                showStatus('❌ Error: ' + err.message, 'error');
                setProgress(0);
            } finally {
                compileBtn.disabled = false;
                compileBtn.classList.remove('loading');
                setTimeout(() => {
                    progressBar.classList.remove('show');
                    progressFill.style.width = '0%';
                }, 2000);
            }
        });
    </script>
</body>
</html>
